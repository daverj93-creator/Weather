    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;

      const GEO_API = "https://geocoding-api.open-meteo.com/v1/search";
      const ZIP_API = "https://api.zippopotam.us/us/";
      const RAINVIEWER_MAX_ZOOM = 7;

      function formatTemp(n) {
        if (n === null || n === undefined || Number.isNaN(Number(n))) return "—";
        return `${Math.round(Number(n))}°F`;
      }
      function formatPct(n) {
        if (n === null || n === undefined || Number.isNaN(Number(n))) return "—";
        return `${Math.round(Number(n))}%`;
      }
      function formatInches(n) {
        if (n === null || n === undefined || Number.isNaN(Number(n))) return "—";
        const v = Number(n);
        return `${v.toFixed(v >= 1 ? 1 : 2)} in`;
      }
      function formatMph(n) {
        if (n === null || n === undefined || Number.isNaN(Number(n))) return "—";
        return `${Math.round(Number(n))} mph`;
      }

      // Desired format: "Sat, Feb 21 2026"
      function formatDateLabel(isoDate) {
        try {
          const d = new Date(`${isoDate}T12:00:00`);
          const s = new Intl.DateTimeFormat("en-US", {
            weekday: "short",
            month: "short",
            day: "numeric",
            year: "numeric",
          }).format(d);
          return s.replace(/, (\d{4})$/, " $1");
        } catch {
          return isoDate;
        }
      }

      function formatWeekdayLabel(isoDate) {
        try {
          const d = new Date(`${isoDate}T12:00:00`);
          return new Intl.DateTimeFormat("en-US", { weekday: "short" }).format(d);
        } catch {
          return isoDate;
        }
      }

      function formatHourLabel(iso) {
        try {
          const d = new Date(iso);
          return d.toLocaleTimeString(undefined, { hour: "numeric" });
        } catch {
          return iso;
        }
      }

      function isLikelyZip(q) {
        return /^\d{5}$/.test(String(q ?? "").trim());
      }

      function nicePlaceLabel({ name, admin1, country_code }) {
        const parts = [name, admin1, country_code].filter(Boolean);
        return parts.join(", ");
      }

      function makeFavoriteKey(fav) {
        if (!fav || !fav.mode) return "";
        if (fav.mode === "zip") return `zip:${fav.zip}`;
        if (fav.mode === "geo") return `geo:${fav.lat}:${fav.lon}`;
        return `unknown:${fav.label || ""}`;
      }

      function favoriteDisplayLabel(fav) {
        if (!fav) return "";
        if (fav.label) return fav.label;
        if (fav.mode === "zip") return fav.zip || "ZIP";
        if (fav.mode === "geo") {
          return fav.city ? `${fav.city}${fav.state ? `, ${fav.state}` : ""}` : `Geo ${fav.lat},${fav.lon}`;
        }
        return "Favorite";
      }

      const WEATHERHOP_TRIPS_STORAGE_KEY = "weatherhop-trips";
      const TRIP_FORECAST_CACHE_MS = 45 * 60 * 1000;

      function todayISODate() {
        return new Date().toISOString().slice(0, 10);
      }

      function makeId(prefix = "id") {
        if (window.crypto?.randomUUID) return `${prefix}-${window.crypto.randomUUID()}`;
        return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function addDaysISO(dateISO, days) {
        const date = new Date(`${dateISO}T12:00:00`);
        date.setDate(date.getDate() + days);
        return date.toISOString().slice(0, 10);
      }

      function dateRangeISO(startDate, endDate) {
        if (!startDate || !endDate || endDate < startDate) return [];
        const dates = [];
        let current = startDate;
        while (current <= endDate && dates.length < 45) {
          dates.push(current);
          current = addDaysISO(current, 1);
        }
        return dates;
      }

      function shortDateLabel(dateISO) {
        try {
          const date = new Date(`${dateISO}T12:00:00`);
          return new Intl.DateTimeFormat("en-US", { weekday: "short", month: "short", day: "numeric" }).format(date);
        } catch {
          return dateISO;
        }
      }

      function isUserAtLocationOnDate(location, date) {
        return !!location?.arrivalDate && !!location?.departureDate && date >= location.arrivalDate && date <= location.departureDate;
      }

      function loadTrips() {
        try {
          const raw = localStorage.getItem(WEATHERHOP_TRIPS_STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function saveTrips(trips) {
        localStorage.setItem(WEATHERHOP_TRIPS_STORAGE_KEY, JSON.stringify(trips ?? []));
      }

      function createDefaultTrip() {
        const startDate = todayISODate();
        const endDate = addDaysISO(startDate, 4);
        const now = new Date().toISOString();
        return {
          id: makeId("trip"),
          name: "New Trip",
          startDate,
          endDate,
          locations: [],
          createdAt: now,
          updatedAt: now,
          notes: "",
        };
      }

      function normalizeTrip(trip) {
        const base = createDefaultTrip();
        return {
          ...base,
          ...trip,
          locations: Array.isArray(trip?.locations) ? trip.locations : [],
          updatedAt: new Date().toISOString(),
        };
      }

      function tripForecastCacheKey(lat, lon) {
        return `weatherhop-trip-forecast-${Number(lat).toFixed(4)}-${Number(lon).toFixed(4)}`;
      }

      async function fetchTripForecast({ lat, lon }) {
        const cacheKey = tripForecastCacheKey(lat, lon);
        try {
          const cached = JSON.parse(localStorage.getItem(cacheKey) || "null");
          if (cached?.savedAt && Date.now() - cached.savedAt < TRIP_FORECAST_CACHE_MS && cached?.data) {
            return cached.data;
          }
        } catch {}

        const params = new URLSearchParams({
          latitude: String(lat),
          longitude: String(lon),
          timezone: "auto",
          temperature_unit: "fahrenheit",
          precipitation_unit: "inch",
          wind_speed_unit: "mph",
          forecast_days: "10",
          daily:
            "temperature_2m_max,temperature_2m_min,precipitation_probability_max,precipitation_sum,windspeed_10m_max,weathercode",
        });
        const response = await fetch(`https://api.open-meteo.com/v1/forecast?${params.toString()}`);
        if (!response.ok) throw new Error(`Forecast failed (${response.status}).`);
        const data = await response.json();
        try {
          localStorage.setItem(cacheKey, JSON.stringify({ savedAt: Date.now(), data }));
        } catch {}
        return data;
      }

      function tripCellFromForecast({ forecast, location, date }) {
        const daily = forecast?.daily;
        const idx = daily?.time?.findIndex((value) => value === date) ?? -1;
        const isUserThere = isUserAtLocationOnDate(location, date);
        if (idx >= 0) {
          const code = daily.weathercode?.[idx];
          const condition = weatherCondition(code, daily.temperature_2m_min?.[idx]);
          const precip = daily.precipitation_probability_max?.[idx];
          const wind = daily.windspeed_10m_max?.[idx];
          const high = daily.temperature_2m_max?.[idx];
          const low = daily.temperature_2m_min?.[idx];
          const risks = [];
          if (Number(precip) >= 50) risks.push("Rain");
          if (Number(high) >= 90) risks.push("Heat");
          if (Number(low) <= 40) risks.push("Cold");
          if (Number(wind) >= 25) risks.push("Wind");
          if ([95, 96, 99].includes(Number(code))) risks.push("Storm");
          return {
            date,
            isUserThere,
            status: "available",
            highTemp: high,
            lowTemp: low,
            conditionLabel: condition.label,
            conditionIcon: condition.icon,
            precipitationChance: precip,
            windSpeed: wind,
            riskLevel: risks.length >= 2 || risks.includes("Storm") ? "high" : risks.length ? "moderate" : "low",
            riskSummary: risks.join(", "),
          };
        }

        const forecastDates = daily?.time ?? [];
        const maxForecastDate = forecastDates.length ? forecastDates[forecastDates.length - 1] : null;
        return {
          date,
          isUserThere,
          status: maxForecastDate && date > maxForecastDate ? "pending" : "unavailable",
        };
      }

      function compactCurrentLocationLabel(place, activeLocation) {
        if (activeLocation?.source !== "current") return null;
        const city = place?.city && place.city !== "—" ? place.city : "Current Location";
        return { title: city, detail: "Current Location" };
      }

      function ThermometerBadge({ color = "#ef4444", label, level = "high" }) {
        const fillTop = level === "low" ? 10.8 : 5.4;
        const stemHeight = 16 - fillTop;
        return (
          <span className="inline-flex align-middle" role="img" aria-label={label} title={label}>
            <svg width="24" height="26" viewBox="0 0 24 26" aria-hidden="true">
              <path
                d="M17.5 5h5"
                fill="none"
                stroke="#111827"
                strokeWidth="1.6"
                strokeLinecap="round"
              ></path>
              <path
                d="M17.5 10h5"
                fill="none"
                stroke="#111827"
                strokeWidth="1.6"
                strokeLinecap="round"
              ></path>
              <path
                d="M17.5 15h5"
                fill="none"
                stroke="#111827"
                strokeWidth="1.6"
                strokeLinecap="round"
              ></path>
              <path
                d="M17.5 20h5"
                fill="none"
                stroke="#111827"
                strokeWidth="1.6"
                strokeLinecap="round"
              ></path>
              <path
                d="M8 2c-2 0-3.6 1.6-3.6 3.6v11.2a5 5 0 1 0 7.2 0V5.6C11.6 3.6 10 2 8 2Z"
                fill="#fff"
                stroke="#111827"
                strokeWidth="1.8"
                strokeLinecap="round"
                strokeLinejoin="round"
              ></path>
              <circle cx="8" cy="18.8" r="3.2" fill={color}></circle>
              <path
                d={`M8 ${fillTop}c-1 0-1.8.8-1.8 1.8V16h3.6V${fillTop + 1.8}c0-1-.8-1.8-1.8-1.8Z`}
                fill={color}
              ></path>
              <path
                d={`M8 ${fillTop}v${stemHeight}`}
                fill="none"
                stroke={color}
                strokeWidth="1.1"
                strokeLinecap="round"
              ></path>
            </svg>
          </span>
        );
      }

      function weatherIcon(code) {
        const c = Number(code);
        if (Number.isNaN(c)) return "❓";
        if (c === 0) return "☀️";
        if (c === 1) return "🌤️";
        if (c === 2) return "⛅";
        if (c === 3) return "☁️";
        if (c === 45 || c === 48) return "🌫️";
        if ([51, 53, 55, 56, 57].includes(c)) return "🌦️";
        if ([61, 63, 65, 66, 67].includes(c)) return "🌧️";
        if ([71, 73, 75, 77].includes(c)) return "🌨️";
        if ([80, 81, 82].includes(c)) return "🌦️";
        if ([85, 86].includes(c)) return "🌨️";
        if ([95, 96, 99].includes(c)) return "⛈️";
        return "🌡️";
      }

      function weatherLabel(code) {
        const c = Number(code);
        if (Number.isNaN(c)) return "—";
        const map = {
          0: "Clear",
          1: "Mainly clear",
          2: "Partly cloudy",
          3: "Overcast",
          45: "Fog",
          48: "Rime fog",
          51: "Light drizzle",
          53: "Drizzle",
          55: "Heavy drizzle",
          56: "Freezing drizzle",
          57: "Freezing drizzle",
          61: "Light rain",
          63: "Rain",
          65: "Heavy rain",
          66: "Freezing rain",
          67: "Freezing rain",
          71: "Light snow",
          73: "Snow",
          75: "Heavy snow",
          77: "Snow grains",
          80: "Rain showers",
          81: "Rain showers",
          82: "Violent showers",
          85: "Snow showers",
          86: "Heavy snow showers",
          95: "Thunderstorm",
          96: "Thunderstorm + hail",
          99: "Thunderstorm + hail",
        };
        return map[c] ?? `Code ${c}`;
      }

      function weatherCondition(code, tempF) {
        const c = Number(code);
        const temp = Number(tempF);
        const label = weatherLabel(code);
        const icon = weatherIcon(code);
        const isSnow = [71, 73, 75, 77, 85, 86].includes(c);

        if (!isSnow || !Number.isFinite(temp)) return { label, icon };

        if (temp >= 40) return { label: "Rain / snow possible", icon: "🌦️" };
        if (temp >= 33) return { label: "Rain / snow mix", icon: "🌨️" };
        return { label, icon };
      }

      function pick24hWindow(hourlyTimes) {
        const now = new Date();
        const startIdx = hourlyTimes.findIndex((t) => new Date(t) >= now);
        if (startIdx < 0) return [0, Math.min(hourlyTimes.length, 24)];
        const endTime = new Date(hourlyTimes[startIdx]);
        endTime.setHours(endTime.getHours() + 24);
        let endIdx = startIdx;
        while (endIdx < hourlyTimes.length && new Date(hourlyTimes[endIdx]) < endTime) endIdx++;
        return [startIdx, Math.max(endIdx, Math.min(hourlyTimes.length, startIdx + 24))];
      }

      // Convert local-time ISO string (YYYY-MM-DDTHH:mm) to UTC millis using utc_offset_seconds
      function localIsoToUtcMillis(localIso, utcOffsetSeconds) {
        if (!localIso) return null;
        const [datePart, timePart] = String(localIso).split("T");
        if (!datePart || !timePart) return null;
        const [Y, M, D] = datePart.split("-").map((x) => parseInt(x, 10));
        const [hh, mm] = timePart.split(":").map((x) => parseInt(x, 10));
        if (![Y, M, D, hh, mm].every(Number.isFinite)) return null;
        const localAsIfUtc = Date.UTC(Y, M - 1, D, hh, mm, 0);
        return localAsIfUtc - utcOffsetSeconds * 1000;
      }

      // Background mode based on sunrise/sunset
      function computeBgMode({ nowUtcMillis, sunriseLocalIso, sunsetLocalIso, utcOffsetSeconds }) {
        const sunriseUtc = localIsoToUtcMillis(sunriseLocalIso, utcOffsetSeconds);
        const sunsetUtc = localIsoToUtcMillis(sunsetLocalIso, utcOffsetSeconds);
        const now = nowUtcMillis;
        if (!Number.isFinite(now) || sunriseUtc == null || sunsetUtc == null) return "day";
        const thirty = 30 * 60 * 1000;

        if (now < sunriseUtc) return "night";
        if (now >= sunsetUtc - thirty && now <= sunsetUtc + thirty) return "twilight";
        if (now > sunsetUtc + thirty) return "night";
        return "day";
      }

      // Feels-like approximation (heat index / wind chill)
      function computeFeelsLikeF(tempF, rhPct, windMph) {
        const T = Number(tempF);
        const RH = Number(rhPct);
        const V = Number(windMph);

        if (!Number.isFinite(T)) return null;

        // Wind chill
        if (Number.isFinite(V) && T <= 50 && V >= 3) {
          const wc =
            35.74 + 0.6215 * T - 35.75 * Math.pow(V, 0.16) + 0.4275 * T * Math.pow(V, 0.16);
          return wc;
        }

        // Heat index
        if (Number.isFinite(RH) && T >= 80 && RH >= 40) {
          const HI =
            -42.379 +
            2.04901523 * T +
            10.14333127 * RH -
            0.22475541 * T * RH -
            0.00683783 * T * T -
            0.05481717 * RH * RH +
            0.00122874 * T * T * RH +
            0.00085282 * T * RH * RH -
            0.00000199 * T * T * RH * RH;
          return HI;
        }

        return T;
      }

      // Moon phase
      function moonPhaseFromAngle(angleDeg) {
        const a = ((angleDeg % 360) + 360) % 360;
        if (a < 22.5 || a >= 337.5) return { name: "New Moon", icon: "🌑" };
        if (a < 67.5) return { name: "Waxing Crescent", icon: "🌒" };
        if (a < 112.5) return { name: "First Quarter", icon: "🌓" };
        if (a < 157.5) return { name: "Waxing Gibbous", icon: "🌔" };
        if (a < 202.5) return { name: "Full Moon", icon: "🌕" };
        if (a < 247.5) return { name: "Waning Gibbous", icon: "🌖" };
        if (a < 292.5) return { name: "Last Quarter", icon: "🌗" };
        return { name: "Waning Crescent", icon: "🌘" };
      }

      function moonInfoAtUtc(utcDate) {
        if (!window.Astronomy) return null;
        const t = new Astronomy.AstroTime(utcDate);
        const phaseAngle = Astronomy.MoonPhase(t);
        const illum = (1 - Math.cos((phaseAngle * Math.PI) / 180)) / 2;
        return { ...moonPhaseFromAngle(phaseAngle), illumination: illum, phaseAngle };
      }

      // Vibrant planet icons (emoji-first)
      const PLANET_ICON = {
        Mercury: "🟤☿️",
        Venus: "🟢♀️",
        Mars: "🔴♂️",
        Jupiter: "🟠 ♃",
        Saturn: "🪐♄",
        Uranus: "🟣⛢",
        Neptune: "🔵♆",
      };
      function planetIcon(name) {
        return PLANET_ICON[name] ?? "🪐";
      }

      // ✅ BEST FIX: format AstroTime dates using tzName (IANA time zone), DST-safe
      function toLocalTimeLabel(astroTime, tzName) {
        if (!astroTime || !astroTime.date) return "—";
        try {
          return new Intl.DateTimeFormat("en-US", {
            timeZone: tzName,
            hour: "numeric",
            minute: "2-digit",
          }).format(astroTime.date);
        } catch {
          return astroTime.date.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
        }
      }

      function computeMoonRiseSetForDate({ lat, lon, utcOffsetSeconds, dateISO, tzName }) {
        if (!window.Astronomy) return null;

        const startUtcMillis = localIsoToUtcMillis(`${dateISO}T00:00`, utcOffsetSeconds);
        if (!Number.isFinite(startUtcMillis)) return null;

        const observer = new Astronomy.Observer(lat, lon, 0);
        const startTime = new Astronomy.AstroTime(new Date(startUtcMillis));
        const limitDays = 2;

        let rise = null;
        let set = null;

        try {
          rise = Astronomy.SearchRiseSet("Moon", observer, +1, startTime, limitDays);
        } catch {}
        try {
          set = Astronomy.SearchRiseSet("Moon", observer, -1, startTime, limitDays);
        } catch {}

        return { rise: toLocalTimeLabel(rise, tzName), set: toLocalTimeLabel(set, tzName) };
      }

      function computeBodyRiseSetForDate({ bodyName, lat, lon, utcOffsetSeconds, dateISO, tzName }) {
        if (!window.Astronomy) return { rise: "—", set: "—" };

        const startUtcMillis = localIsoToUtcMillis(`${dateISO}T00:00`, utcOffsetSeconds);
        if (!Number.isFinite(startUtcMillis)) return { rise: "—", set: "—" };

        const observer = new Astronomy.Observer(lat, lon, 0);
        const startTime = new Astronomy.AstroTime(new Date(startUtcMillis));
        const limitDays = 2;

        let rise = null;
        let set = null;

        try {
          rise = Astronomy.SearchRiseSet(bodyName, observer, +1, startTime, limitDays);
        } catch {}
        try {
          set = Astronomy.SearchRiseSet(bodyName, observer, -1, startTime, limitDays);
        } catch {}

        return { rise: toLocalTimeLabel(rise, tzName), set: toLocalTimeLabel(set, tzName) };
      }

      // ✅ Planets calc: label is DATE ONLY (no time, per request)
      function computeVisiblePlanetsAt10pmLocal({ lat, lon, utcOffsetSeconds, dateISO, tzName }) {
        if (!window.Astronomy) return null;

        // 10:00 PM local -> UTC (using offset from Open-Meteo for that location)
        const [Y, M, D] = dateISO.split("-").map((x) => parseInt(x, 10));
        const localMillisAssumingUtc = Date.UTC(Y, M - 1, D, 22, 0, 0);
        const utcMillis = localMillisAssumingUtc - utcOffsetSeconds * 1000;

        const date = new Date(utcMillis);
        const observer = new Astronomy.Observer(lat, lon, 0);

        const bodies = ["Mercury", "Venus", "Mars", "Jupiter", "Saturn", "Uranus", "Neptune"];

        const results = bodies.map((name) => {
          const eq = Astronomy.Equator(name, date, observer, true, true);
          const hor = Astronomy.Horizon(date, observer, eq.ra, eq.dec, "normal");
          const illum = Astronomy.Illumination(name, date);
          const rs = computeBodyRiseSetForDate({
            bodyName: name,
            lat,
            lon,
            utcOffsetSeconds,
            dateISO,
            tzName,
          });
          return { name, altitude: hor.altitude, magnitude: illum?.mag ?? null, rise: rs.rise, set: rs.set };
        });

        const visible = results
          .filter((p) => p.altitude > 0 && (p.magnitude === null || p.magnitude <= 6.0))
          .sort((a, b) => b.altitude - a.altitude);

        return { localLabel: `${formatDateLabel(dateISO)}`, visible };
      }

      // Chart.js plugin: draw vertical "now" line (dash only; no dot)
      function makeNowLinePlugin(getIndexFn, getColorFn) {
        return {
          id: "nowLine",
          afterDatasetsDraw(chart) {
            const idx = getIndexFn?.();
            if (idx === null || idx === undefined || idx < 0) return;
            const { ctx, chartArea, scales } = chart;
            const xScale = scales.x;
            if (!xScale || !chartArea) return;

            const x = xScale.getPixelForValue(idx);
            if (!Number.isFinite(x)) return;

            ctx.save();
            ctx.strokeStyle = getColorFn?.() ?? "rgba(37,99,235,0.65)";
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 6]);
            ctx.beginPath();
            ctx.moveTo(x, chartArea.top);
            ctx.lineTo(x, chartArea.bottom);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
          },
        };
      }

      function prettyTimezoneName(tzName) {
        const map = [
          { key: "Pacific", zones: ["America/Los_Angeles", "US/Pacific", "Canada/Pacific"] },
          { key: "Mountain", zones: ["America/Denver", "US/Mountain", "Canada/Mountain", "America/Phoenix"] },
          { key: "Central", zones: ["America/Chicago", "US/Central", "Canada/Central"] },
          { key: "Eastern", zones: ["America/New_York", "US/Eastern", "Canada/Eastern"] },
        ];
        for (const m of map) {
          if (m.zones.includes(tzName)) return m.key;
        }
        return tzName;
      }

      // local time string using utc_offset_seconds
      function localTimeFromOffset(utcOffsetSeconds) {
        const d = new Date(Date.now() + (Number(utcOffsetSeconds) || 0) * 1000);
        try {
          return d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
        } catch {
          return d.toISOString();
        }
      }

      function formatLocalIsoTime(localIso) {
        if (!localIso) return "—";
        try {
          const d = new Date(localIso);
          return d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
        } catch {
          return String(localIso).split("T")[1] ?? String(localIso);
        }
      }

      function computeSunArcInfo({ dateISO, sunriseLocalIso, sunsetLocalIso, utcOffsetSeconds }) {
        if (!dateISO || !sunriseLocalIso || !sunsetLocalIso) return null;

        const currentLocal = new Date(Date.now() + (Number(utcOffsetSeconds) || 0) * 1000);
        const hh = String(currentLocal.getUTCHours()).padStart(2, "0");
        const mm = String(currentLocal.getUTCMinutes()).padStart(2, "0");
        const probeUtc = localIsoToUtcMillis(`${dateISO}T${hh}:${mm}`, utcOffsetSeconds);
        const sunriseUtc = localIsoToUtcMillis(sunriseLocalIso, utcOffsetSeconds);
        const sunsetUtc = localIsoToUtcMillis(sunsetLocalIso, utcOffsetSeconds);
        if (![probeUtc, sunriseUtc, sunsetUtc].every(Number.isFinite)) return null;

        const duration = Math.max(1, sunsetUtc - sunriseUtc);
        const progress = (probeUtc - sunriseUtc) / duration;
        const clamped = Math.max(0, Math.min(1, progress));
        const isDaylight = probeUtc >= sunriseUtc && probeUtc <= sunsetUtc;
        const status = probeUtc < sunriseUtc ? "Sun not up yet" : probeUtc > sunsetUtc ? "Sun has set" : "Sun is up";
        const arcHeightPx = Math.sin(clamped * Math.PI) * 68;

        return { progress: clamped, isDaylight, status, arcHeightPx };
      }

      function formatDurationMs(ms) {
        if (!Number.isFinite(ms) || ms <= 0) return "—";
        const totalMinutes = Math.round(ms / 60000);
        const h = Math.floor(totalMinutes / 60);
        const m = totalMinutes % 60;
        return `${h}h ${String(m).padStart(2, "0")}m`;
      }

      function degreesToCompass(deg) {
        const value = Number(deg);
        if (!Number.isFinite(value)) return "—";
        const dirs = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
        return dirs[Math.round((((value % 360) + 360) % 360) / 22.5) % 16];
      }

      function hourFromLocalIso(iso) {
        const match = String(iso ?? "").match(/T(\d{2})/);
        return match ? Number(match[1]) : null;
      }

      function averageFinite(values) {
        const nums = (values ?? []).map(Number).filter((v) => Number.isFinite(v));
        if (!nums.length) return null;
        return nums.reduce((sum, value) => sum + value, 0) / nums.length;
      }

      function maxFinite(values) {
        const nums = (values ?? []).map(Number).filter((v) => Number.isFinite(v));
        return nums.length ? Math.max(...nums) : null;
      }

      function getNightSkyHourlyConditions(hourly, dateISO) {
        const times = hourly?.time ?? [];
        const cloud = hourly?.cloud_cover ?? [];
        const precip = hourly?.precipitation_probability ?? [];
        const codes = hourly?.weathercode ?? [];
        const preferred = [];
        const fallback = [];

        for (let i = 0; i < times.length; i++) {
          if (!String(times[i]).startsWith(dateISO)) continue;
          const hour = hourFromLocalIso(times[i]);
          if (!Number.isFinite(hour)) continue;
          const row = {
            cloudCover: cloud[i],
            precipProbability: precip[i],
            weatherCode: codes[i],
          };
          if (hour >= 21 && hour <= 23) preferred.push(row);
          if (hour >= 20 && hour <= 23) fallback.push(row);
        }

        const rows = preferred.length ? preferred : fallback;
        return {
          cloudCover: averageFinite(rows.map((row) => row.cloudCover)),
          precipProbability: maxFinite(rows.map((row) => row.precipProbability)),
          weatherCodes: rows.map((row) => row.weatherCode).filter((code) => Number.isFinite(Number(code))),
        };
      }

      function getStarViewingAssessment({ moonIllumination, weatherCode, cloudCover, precipProbability, weatherCodes }) {
        const illumPct = Number.isFinite(Number(moonIllumination)) ? Math.round(Number(moonIllumination) * 100) : null;
        const code = Number(weatherCode);
        const codes = (weatherCodes?.length ? weatherCodes : [code]).map(Number).filter((value) => Number.isFinite(value));
        const cloudPct = Number.isFinite(Number(cloudCover)) ? Math.round(Number(cloudCover)) : null;
        const precipPct = Number.isFinite(Number(precipProbability)) ? Math.round(Number(precipProbability)) : null;

        const blockingCodes = [45, 48, 53, 55, 56, 57, 63, 65, 66, 67, 73, 75, 77, 81, 82, 85, 86, 95, 96, 99];
        const cloudyCodes = [3];
        const partlyCodes = [1, 2, 51, 61, 71, 80];

        let score = 100;
        let skyText = "Clear skies";

        if (cloudPct !== null) {
          if (cloudPct >= 90) {
            score -= 78;
            skyText = `Overcast near 10 PM (${cloudPct}% cloud cover)`;
          } else if (cloudPct >= 75) {
            score -= 62;
            skyText = `Mostly cloudy near 10 PM (${cloudPct}% cloud cover)`;
          } else if (cloudPct >= 50) {
            score -= 42;
            skyText = `Clouds likely limit viewing (${cloudPct}% cloud cover)`;
          } else if (cloudPct >= 25) {
            score -= 22;
            skyText = `Patchy clouds near 10 PM (${cloudPct}% cloud cover)`;
          } else if (cloudPct >= 10) {
            score -= 10;
            skyText = `Mostly clear near 10 PM (${cloudPct}% cloud cover)`;
          }
        } else if (codes.some((value) => blockingCodes.includes(value) || cloudyCodes.includes(value))) {
          score -= 65;
          skyText = "Clouds or precip likely";
        } else if (codes.some((value) => partlyCodes.includes(value))) {
          score -= 28;
          skyText = "Some cloud interference";
        }

        if (precipPct !== null) {
          if (precipPct >= 50) score -= 35;
          else if (precipPct >= 25) score -= 24;
          else if (precipPct >= 10) score -= 14;
          else if (precipPct >= 5) score -= 7;
        }

        if (codes.some((value) => blockingCodes.includes(value))) {
          score -= 18;
        }

        if (illumPct !== null) {
          if (illumPct >= 90) score -= 18;
          else if (illumPct >= 70) score -= 13;
          else if (illumPct >= 40) score -= 8;
          else if (illumPct >= 20) score -= 4;
        }

        if (cloudPct >= 90) score = Math.min(score, 22);
        else if (cloudPct >= 75) score = Math.min(score, 38);
        if (precipPct >= 50) score = Math.min(score, 35);
        if (codes.some((value) => blockingCodes.includes(value))) score = Math.min(score, 42);

        score = Math.max(5, Math.min(95, score));

        let label = "Excellent";
        if (score < 35) label = "Poor";
        else if (score < 55) label = "Fair";
        else if (score < 75) label = "Good";

        const moonText = illumPct === null ? "Moonlight unknown" : illumPct >= 70 ? "Bright moonlight" : illumPct >= 35 ? "Moderate moonlight" : "Low moonlight";
        const precipText = precipPct === null ? null : precipPct >= 10 ? `${precipPct}% precip risk` : "Low precip risk";
        const detail = [skyText, precipText, moonText].filter(Boolean).join(" • ");
        return { score, label, detail };
      }

                  : location.departureDate > endDate
                  ? endDate
                  : location.departureDate;
              return { ...location, arrivalDate, departureDate };
            });
            return { startDate, endDate, locations };
          });
        }

        function createTrip() {
          const trip = createDefaultTrip();
          setTrips((prev) => [trip, ...prev]);
          setSelectedTripId(trip.id);
        }

        function duplicateTrip() {
          if (!selectedTrip) return;
          const now = new Date().toISOString();
          const copy = {
            ...selectedTrip,
            id: makeId("trip"),
            name: `${selectedTrip.name || "Trip"} Copy`,
            createdAt: now,
            updatedAt: now,
            locations: (selectedTrip.locations ?? []).map((location) => ({ ...location, id: makeId("trip-location") })),
          };
          setTrips((prev) => [copy, ...prev]);
          setSelectedTripId(copy.id);
        }

        function deleteTrip() {
          if (!selectedTrip) return;
          if (!window.confirm(`Delete ${selectedTrip.name || "this trip"}?`)) return;
          setTrips((prev) => prev.filter((trip) => trip.id !== selectedTrip.id));
        }

        useEffect(() => {
          const q = String(searchText ?? "").trim();
          if (searchTimerRef.current) clearTimeout(searchTimerRef.current);
          if (!q) {
            setSearchResults([]);
            setSearchLoading(false);
            return;
          }

          setSearchLoading(true);
          searchTimerRef.current = setTimeout(async () => {
            try {
              const results = [];
              if (isLikelyZip(q)) results.push({ _type: "zip", zip: q, label: `ZIP ${q}` });
              const params = new URLSearchParams({ name: q, count: "6", language: "en", format: "json" });
              const res = await fetch(`${GEO_API}?${params.toString()}`);
              if (res.ok) {
                const json = await res.json();
                for (const place of json?.results ?? []) {
                  results.push({ ...place, _type: "geo", label: nicePlaceLabel(place) });
                }
              }
              setSearchResults(results.slice(0, 8));
            } catch {
              setSearchResults([]);
            } finally {
              setSearchLoading(false);
            }
          }, 300);

          return () => {
            if (searchTimerRef.current) clearTimeout(searchTimerRef.current);
          };
        }, [searchText]);

        async function resolveTripSearchResult(result) {
          if (result?._type === "zip") {
            const zipRes = await fetch(`${ZIP_API}${result.zip}`);
            if (!zipRes.ok) throw new Error("ZIP lookup failed.");
            const json = await zipRes.json();
            const first = json?.places?.[0];
            const lat = Number(first?.latitude);
            const lon = Number(first?.longitude);
            if (!Number.isFinite(lat) || !Number.isFinite(lon)) throw new Error("ZIP lookup returned invalid coordinates.");
            const displayName = `${first["place name"]}, ${first["state abbreviation"] ?? first.state ?? ""}`.replace(/, $/, "");
            return { displayName, name: displayName, latitude: lat, longitude: lon };
          }

          const lat = Number(result?.latitude);
          const lon = Number(result?.longitude);
          if (!Number.isFinite(lat) || !Number.isFinite(lon)) throw new Error("Location is missing coordinates.");
          const displayName = nicePlaceLabel(result);
          return { displayName, name: result.name || displayName, latitude: lat, longitude: lon };
        }

        async function addTripLocation(result) {
          if (!selectedTrip || !result) return;
          try {
            const resolved = await resolveTripSearchResult(result);
            const location = {
              id: makeId("trip-location"),
              name: resolved.name,
              displayName: resolved.displayName,
              latitude: resolved.latitude,
              longitude: resolved.longitude,
              arrivalDate: selectedTrip.startDate,
              departureDate: selectedTrip.endDate,
              notes: "",
            };
            updateSelectedTrip({ locations: [...(selectedTrip.locations ?? []), location] });
            setSearchText("");
            setSearchResults([]);
          } catch (e) {
            window.alert(e?.message ?? "Could not add that location.");
          }
        }

        function updateLocation(locationId, patch) {
          updateSelectedTrip((trip) => ({
            locations: (trip.locations ?? []).map((location) => {
              if (location.id !== locationId) return location;
              let next = { ...location, ...patch };
              if (next.arrivalDate < trip.startDate) next.arrivalDate = trip.startDate;
              if (next.arrivalDate > trip.endDate) next.arrivalDate = trip.endDate;
              if (next.departureDate < next.arrivalDate) next.departureDate = next.arrivalDate;
              if (next.departureDate > trip.endDate) next.departureDate = trip.endDate;
              return next;
            }),
          }));
        }

        function removeLocation(locationId) {
          updateSelectedTrip((trip) => ({
            locations: (trip.locations ?? []).filter((location) => location.id !== locationId),
          }));
        }

        useEffect(() => {
          if (!selectedTrip?.locations?.length) {
            setForecastByLocation({});
            return;
          }

          let cancelled = false;
          selectedTrip.locations.forEach((location) => {
            if (!Number.isFinite(Number(location.latitude)) || !Number.isFinite(Number(location.longitude))) return;
            setForecastByLocation((prev) => ({
              ...prev,
              [location.id]: prev[location.id]?.data ? prev[location.id] : { loading: true, error: "", data: null },
            }));
            fetchTripForecast({ lat: location.latitude, lon: location.longitude })
              .then((data) => {
                if (!cancelled) {
                  setForecastByLocation((prev) => ({ ...prev, [location.id]: { loading: false, error: "", data } }));
                }
              })
              .catch((e) => {
                if (!cancelled) {
                  setForecastByLocation((prev) => ({
                    ...prev,
                    [location.id]: { loading: false, error: e?.message ?? "Forecast unavailable", data: null },
                  }));
                }
              });
          });

          return () => {
            cancelled = true;
          };
        }, [selectedTrip?.id, selectedTrip?.locations?.map((location) => `${location.id}:${location.latitude}:${location.longitude}`).join("|")]);

        const tripSummary = useMemo(() => {
          if (!selectedTrip?.locations?.length || !tripDates.length) return [];
          const availableHereCells = [];
          for (const location of selectedTrip.locations) {
            const forecast = forecastByLocation[location.id]?.data;
            for (const date of tripDates) {
              const cell = tripCellFromForecast({ forecast, location, date });
              if (cell.isUserThere && cell.status === "available") availableHereCells.push({ location, cell });
            }
          }

          const notes = [];
          const rainy = availableHereCells.filter(({ cell }) => Number(cell.precipitationChance) >= 50);
          const stormy = availableHereCells.filter(({ cell }) => String(cell.riskSummary || "").includes("Storm"));
          const windy = availableHereCells.filter(({ cell }) => Number(cell.windSpeed) >= 25);
          const hottest = availableHereCells.reduce((best, item) => (Number(item.cell.highTemp) > Number(best?.cell?.highTemp ?? -999) ? item : best), null);
          const coldest = availableHereCells.reduce((best, item) => (Number(item.cell.lowTemp) < Number(best?.cell?.lowTemp ?? 999) ? item : best), null);

          if (rainy[0]) notes.push(`Rain risk: ${rainy[0].location.displayName} on ${shortDateLabel(rainy[0].cell.date)} (${formatPct(rainy[0].cell.precipitationChance)}).`);
          if (stormy[0]) notes.push(`Storm risk: ${stormy[0].location.displayName} on ${shortDateLabel(stormy[0].cell.date)}.`);
          if (hottest?.cell) notes.push(`Warmest scheduled day: ${hottest.location.displayName}, ${shortDateLabel(hottest.cell.date)} at ${formatTemp(hottest.cell.highTemp)}.`);
          if (coldest?.cell) notes.push(`Coolest scheduled morning: ${coldest.location.displayName}, ${shortDateLabel(coldest.cell.date)} at ${formatTemp(coldest.cell.lowTemp)}.`);
          if (windy[0]) notes.push(`Windy day possible: ${windy[0].location.displayName} on ${shortDateLabel(windy[0].cell.date)} (${formatMph(windy[0].cell.windSpeed)}).`);
          return notes.slice(0, 5);
        }, [selectedTrip, tripDates.join(","), forecastByLocation]);

        const inputClass = `rounded-2xl px-3 py-2 text-sm outline-none ring-1 ${
          isDarkUI ? "bg-white/10 text-white ring-white/10 placeholder:text-slate-400" : "bg-white text-slate-900 ring-black/10 placeholder:text-slate-400"
        }`;
        const buttonClass = `rounded-2xl px-3 py-2 text-sm font-semibold shadow active:scale-[0.99] ${
          isDarkUI ? "bg-white/10 text-white ring-1 ring-white/15 hover:bg-white/15" : "bg-white text-slate-900 ring-1 ring-black/5 hover:bg-slate-50"
        }`;

        return (
          <div className={`mt-6 rounded-3xl border p-4 sm:p-6 ${cardBg} ${borderSoft} ${cardText} shadow-[0_10px_30px_rgba(0,0,0,0.10)]`}>
            <div className="flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
              <div>
                <div className={`text-xs font-semibold uppercase tracking-wide ${subText}`}>WeatherHop Travel</div>
                <h1 className="mt-1 text-2xl font-semibold tracking-normal">Trip weather planner</h1>
              </div>
              <div className="flex flex-wrap items-center gap-2">
                <select
                  className={`${inputClass} min-w-[210px]`}
                  value={selectedTrip?.id ?? ""}
                  onChange={(e) => setSelectedTripId(e.target.value)}
                  disabled={!trips.length}
                >
                  {trips.length ? null : <option value="">No saved trips</option>}
                  {trips.map((trip) => (
                    <option key={trip.id} value={trip.id}>
                      {trip.name || "Untitled trip"}
                    </option>
                  ))}
                </select>
                <button type="button" onClick={createTrip} className={buttonClass}>New trip</button>
                {selectedTrip ? <button type="button" onClick={duplicateTrip} className={buttonClass}>Duplicate</button> : null}
                {selectedTrip ? <button type="button" onClick={deleteTrip} className={`${buttonClass} ${isDarkUI ? "text-red-100" : "text-red-700"}`}>Delete</button> : null}
              </div>
            </div>

            {!selectedTrip ? (
              <div className={`mt-6 rounded-3xl p-6 text-sm ring-1 ${isDarkUI ? "bg-white/5 ring-white/10" : "bg-slate-50 ring-black/5"} ${subText}`}>
                Create a trip to start planning weather across locations and dates.
              </div>
            ) : (
              <div className="mt-6 space-y-5">
                <div className={`grid gap-3 rounded-3xl p-4 ring-1 md:grid-cols-[1.2fr_0.7fr_0.7fr] ${isDarkUI ? "bg-white/5 ring-white/10" : "bg-slate-50 ring-black/5"}`}>
                  <label className="block">
                    <span className={`text-xs font-semibold uppercase tracking-wide ${subText}`}>Trip name</span>
                    <input
                      className={`${inputClass} mt-1 w-full`}
                      value={selectedTrip.name}
                      onChange={(e) => updateSelectedTrip({ name: e.target.value })}
                    />
                  </label>
                  <label className="block">
                    <span className={`text-xs font-semibold uppercase tracking-wide ${subText}`}>Start</span>
                    <input
                      type="date"
                      className={`${inputClass} mt-1 w-full`}
                      value={selectedTrip.startDate}
                      onChange={(e) => updateTripDates("startDate", e.target.value)}
                    />
                  </label>
                  <label className="block">
                    <span className={`text-xs font-semibold uppercase tracking-wide ${subText}`}>End</span>
                    <input
                      type="date"
                      className={`${inputClass} mt-1 w-full`}
                      value={selectedTrip.endDate}
                      onChange={(e) => updateTripDates("endDate", e.target.value)}
                    />
                  </label>
                </div>

                <div className={`rounded-3xl p-4 ring-1 ${isDarkUI ? "bg-white/5 ring-white/10" : "bg-slate-50 ring-black/5"}`}>
                  <div className="flex flex-col gap-3 lg:flex-row lg:items-end lg:justify-between">
                    <div>
                      <div className={`text-xs font-semibold uppercase tracking-wide ${subText}`}>Locations</div>
                      <div className={`mt-1 text-sm ${subText}`}>Add each stop, then set the dates you expect to be there.</div>
                    </div>
                    <div className="relative w-full lg:w-[360px]">
                      <input
                        className={`${inputClass} w-full`}
                        value={searchText}
                        onChange={(e) => setSearchText(e.target.value)}
                        placeholder="Search city, state, or ZIP"
                      />
                      {searchText ? (
                        <div className={`absolute left-0 right-0 z-[70] mt-2 overflow-hidden rounded-3xl border shadow-[0_20px_50px_rgba(0,0,0,0.20)] ${
                          isDarkUI ? "border-white/10 bg-black/85" : "border-black/5 bg-white/95"
                        }`}>
                          <div className={`px-4 py-3 text-xs ${subText}`}>{searchLoading ? "Searching..." : searchResults.length ? "Add location:" : "No matches yet."}</div>
                          {searchResults.map((result, idx) => (
                            <button
                              key={`${result._type}:${result.id ?? result.zip ?? idx}`}
                              type="button"
                              className={`w-full px-4 py-3 text-left text-sm ${isDarkUI ? "hover:bg-white/10" : "hover:bg-black/5"}`}
                              onMouseDown={(e) => e.preventDefault()}
                              onClick={() => addTripLocation(result)}
                            >
                              <span className="font-semibold">{result.label || nicePlaceLabel(result)}</span>
                              <span className={`ml-2 text-xs ${subText}`}>{result._type === "zip" ? "ZIP" : "City"}</span>
                            </button>
                          ))}
                        </div>
                      ) : null}
                    </div>
                  </div>

                  <div className="mt-4 space-y-3">
                    {(selectedTrip.locations ?? []).length ? null : (
                      <div className={`rounded-2xl p-4 text-sm ring-1 ${isDarkUI ? "bg-black/10 ring-white/10" : "bg-white ring-black/5"} ${subText}`}>
                        Add at least one location to build the grid.
                      </div>
                    )}

                    {(selectedTrip.locations ?? []).map((location) => (
                      <div
                        key={location.id}
                        className={`grid gap-3 rounded-2xl p-3 ring-1 lg:grid-cols-[1.2fr_0.55fr_0.55fr_auto] lg:items-end ${
                          isDarkUI ? "bg-black/10 ring-white/10" : "bg-white ring-black/5"
                        }`}
                      >
                        <label className="block">
                          <span className={`text-xs font-semibold uppercase tracking-wide ${subText}`}>Stop</span>
                          <input
                            className={`${inputClass} mt-1 w-full`}
                            value={location.displayName}
                            onChange={(e) => updateLocation(location.id, { displayName: e.target.value, name: e.target.value })}
                          />
                        </label>
                        <label className="block">
                          <span className={`text-xs font-semibold uppercase tracking-wide ${subText}`}>Arrive</span>
                          <input
                            type="date"
                            className={`${inputClass} mt-1 w-full`}
                            min={selectedTrip.startDate}
                            max={selectedTrip.endDate}
                            value={location.arrivalDate}
                            onChange={(e) => updateLocation(location.id, { arrivalDate: e.target.value })}
                          />
                        </label>
                        <label className="block">
                          <span className={`text-xs font-semibold uppercase tracking-wide ${subText}`}>Depart</span>
                          <input
                            type="date"
                            className={`${inputClass} mt-1 w-full`}
                            min={location.arrivalDate || selectedTrip.startDate}
                            max={selectedTrip.endDate}
                            value={location.departureDate}
                            onChange={(e) => updateLocation(location.id, { departureDate: e.target.value })}
                          />
                        </label>
                        <button type="button" onClick={() => removeLocation(location.id)} className={`${buttonClass} h-10`}>Remove</button>
                      </div>
                    ))}
                  </div>
                </div>

                <div className={`rounded-3xl p-4 ring-1 ${isDarkUI ? "bg-white/5 ring-white/10" : "bg-slate-50 ring-black/5"}`}>
                  <div className="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
                    <div>
                      <div className={`text-xs font-semibold uppercase tracking-wide ${subText}`}>Trip summary</div>
                      <div className={`mt-1 text-sm ${subText}`}>Generated from scheduled days with available forecast data.</div>
                    </div>
                    <div className={`text-xs ${subText}`}>{tripDates.length} trip days</div>
                  </div>
                  {tripSummary.length ? (
                    <div className="mt-4 grid gap-2 lg:grid-cols-2">
                      {tripSummary.map((item, idx) => (
                        <div key={`${item}:${idx}`} className={`rounded-2xl px-3 py-2 text-sm ring-1 ${isDarkUI ? "bg-black/10 ring-white/10" : "bg-white ring-black/5"}`}>
                          {item}
                        </div>
                      ))}
                    </div>
                  ) : (
                    <div className={`mt-4 rounded-2xl p-4 text-sm ring-1 ${isDarkUI ? "bg-black/10 ring-white/10" : "bg-white ring-black/5"} ${subText}`}>
                      Summary appears after locations have forecast data for scheduled dates.
                    </div>
                  )}
                </div>

                <div className={`overflow-hidden rounded-3xl ring-1 ${isDarkUI ? "ring-white/10" : "ring-black/5"}`}>
                  <div className="overflow-x-auto">
                    <table className="w-full min-w-[920px] border-separate border-spacing-0">
                      <thead>
                        <tr className={isDarkUI ? "bg-slate-950/90" : "bg-white"}>
                          <th className={`sticky left-0 z-20 min-w-[190px] px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide ${subText} ${isDarkUI ? "bg-slate-950" : "bg-white"}`}>
                            Location
                          </th>
                          {tripDates.map((date) => (
                            <th key={date} className={`min-w-[150px] border-l px-3 py-3 text-left text-xs font-semibold ${isDarkUI ? "border-white/10" : "border-black/5"}`}>
                              <div>{shortDateLabel(date)}</div>
                              <div className={`mt-0.5 font-normal ${subText}`}>{date}</div>
                            </th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {(selectedTrip.locations ?? []).map((location) => {
                          const forecastState = forecastByLocation[location.id];
                          return (
                            <tr key={location.id}>
                              <th className={`sticky left-0 z-10 border-t px-4 py-3 text-left align-top text-sm font-semibold ${
                                isDarkUI ? "border-white/10 bg-slate-950" : "border-black/5 bg-white"
                              }`}>
                                <div>{location.displayName}</div>
                                <div className={`mt-1 text-xs font-normal ${subText}`}>
                                  {location.arrivalDate} to {location.departureDate}
                                </div>
                                {forecastState?.loading ? <div className={`mt-2 text-xs ${subText}`}>Loading forecast...</div> : null}
                                {forecastState?.error ? <div className="mt-2 text-xs text-red-500">{forecastState.error}</div> : null}
                              </th>
                              {tripDates.map((date) => {
                                const cell = tripCellFromForecast({ forecast: forecastState?.data, location, date });
                                const isHere = cell.isUserThere;
                                const riskClass =
                                  cell.riskLevel === "high"
                                    ? isDarkUI
                                      ? "border-red-300/40 bg-red-500/15"
                                      : "border-red-200 bg-red-50"
                                    : cell.riskLevel === "moderate"
                                    ? isDarkUI
                                      ? "border-amber-300/40 bg-amber-500/15"
                                      : "border-amber-200 bg-amber-50"
                                    : isDarkUI
                                    ? "border-white/10 bg-white/5"
                                    : "border-black/5 bg-white";
                                return (
                                  <td key={`${location.id}:${date}`} className={`border-l border-t p-2 align-top ${isDarkUI ? "border-white/10" : "border-black/5"}`}>
                                    <div
                                      className={`min-h-[116px] rounded-2xl border p-3 text-sm ${riskClass} ${
                                        isHere ? (isDarkUI ? "ring-2 ring-emerald-300/40" : "ring-2 ring-emerald-300") : "opacity-75"
                                      }`}
                                    >
                                      {isHere ? <div className="mb-2 inline-flex rounded-full bg-[#7AC943] px-2 py-0.5 text-[11px] font-semibold text-slate-950">Here</div> : null}
                                      {cell.status === "available" ? (
                                        <>
                                          <div className="flex items-center justify-between gap-2">
                                            <div className="text-lg font-semibold">{formatTemp(cell.highTemp)} / {formatTemp(cell.lowTemp)}</div>
                                            <div className="text-2xl leading-none">{cell.conditionIcon}</div>
                                          </div>
                                          <div className={`mt-1 text-xs ${subText}`}>{cell.conditionLabel}</div>
                                          <div className="mt-2 grid grid-cols-2 gap-2 text-xs">
                                            <div>Rain {formatPct(cell.precipitationChance)}</div>
                                            <div>Wind {formatMph(cell.windSpeed)}</div>
                                          </div>
                                          {cell.riskSummary ? <div className="mt-2 text-xs font-semibold">{cell.riskSummary}</div> : null}
                                        </>
                                      ) : cell.status === "pending" ? (
                                        <div className={`text-xs ${subText}`}>Forecast not available yet</div>
                                      ) : forecastState?.loading ? (
                                        <div className={`text-xs ${subText}`}>Loading...</div>
                                      ) : (
                                        <div className={`text-xs ${subText}`}>No forecast data</div>
                                      )}
                                    </div>
                                  </td>
                                );
                              })}
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      function WeatherApp() {
        const USE_CURRENT_LOCATION_KEY = "weatherhop-use-current-location";

        // Favorites state (persistent)
        const [favorites, setFavorites] = useState([]);
        const [defaultZip, setDefaultZip] = useState(null);
        const [favoritesLoaded, setFavoritesLoaded] = useState(false);
        const [showManage, setShowManage] = useState(false);
        const [useCurrentLocationDefault, setUseCurrentLocationDefault] = useState(
          () => localStorage.getItem(USE_CURRENT_LOCATION_KEY) === "true"
	        );
	        const [locationStatus, setLocationStatus] = useState("");
	        const [requestingLocation, setRequestingLocation] = useState(false);
	        const [showRadar, setShowRadar] = useState(false);
	        const [activeView, setActiveView] = useState("weather");

        // Favorites selection (kept)
        const [zip, setZip] = useState(null);

        const zipLabels = useMemo(() => Object.fromEntries(favorites.map((f) => [f.zip || "", f.label])), [favorites]);

        // Load favorites from localStorage
        useEffect(() => {
          const saved = localStorage.getItem('weatherhop-favorites');
          if (saved) {
            try {
              const data = JSON.parse(saved);
              setFavorites(data.favorites || []);
              setDefaultZip(data.defaultZip || null);
            } catch (e) {
              console.warn('Failed to load favorites', e);
            }
          } else {
            setFavorites([]);
            setDefaultZip(null);
          }
          setFavoritesLoaded(true);
        }, []);

        // Save favorites to localStorage
        useEffect(() => {
          if (favoritesLoaded) {
            localStorage.setItem('weatherhop-favorites', JSON.stringify({ favorites, defaultZip }));
          }
        }, [favorites, defaultZip, favoritesLoaded]);

        // Active location: either a favorite ZIP, or a searched geo location
        const [activeLocation, setActiveLocation] = useState(null);

        const isActiveFavorited = useMemo(() => {
          if (!activeLocation || !favoritesLoaded) return false;
          if (activeLocation.mode === "zip" && activeLocation.zip) {
            return favorites.some((f) => f.zip === activeLocation.zip);
          }
          if (activeLocation.mode === "geo" && Number.isFinite(Number(activeLocation.lat)) && Number.isFinite(Number(activeLocation.lon))) {
            return favorites.some(
              (f) =>
                f.mode === "geo" &&
                Number(f.lat) === Number(activeLocation.lat) &&
                Number(f.lon) === Number(activeLocation.lon)
            );
          }
          return false;
        }, [activeLocation, favorites, favoritesLoaded]);

        const canSaveActive = useMemo(() => {
          if (!favoritesLoaded || !activeLocation) return false;
          if (activeLocation.mode === "zip") return !!activeLocation.zip;
          if (activeLocation.mode === "geo") return Number.isFinite(Number(activeLocation.lat)) && Number.isFinite(Number(activeLocation.lon));
          return false;
        }, [favoritesLoaded, activeLocation]);

        const favoriteOptions = useMemo(() => {
          if (!Array.isArray(favorites)) return [];
          return favorites.map((f) => ({
            ...f,
            key: makeFavoriteKey(f),
            display: favoriteDisplayLabel(f),
          }));
        }, [favorites]);

        const selectedFavoriteKey = useMemo(() => {
          if (!activeLocation || !isActiveFavorited) return "";
          if (activeLocation.mode === "zip") return `zip:${activeLocation.zip}`;

        // ---------- Fetch helpers ----------
        async function lookupZipToCoords(selectedZip) {
          const zipRes = await fetch(`${ZIP_API}${selectedZip}`);
          if (!zipRes.ok) throw new Error(`ZIP lookup failed (${zipRes.status}).`);
          const zipJson = await zipRes.json();
          const first = zipJson?.places?.[0];
          const lat = Number(first?.latitude);
          const lon = Number(first?.longitude);
          if (!Number.isFinite(lat) || !Number.isFinite(lon)) throw new Error("ZIP lookup returned invalid coordinates.");
          return {
            lat,
            lon,
            city: first["place name"],
            state: first["state abbreviation"] ?? first?.state,
          };
        }

        async function fetchOpenMeteo({ lat, lon }) {
          const params = new URLSearchParams({
            latitude: String(lat),
            longitude: String(lon),
            timezone: "auto",
            temperature_unit: "fahrenheit",
            precipitation_unit: "inch",
            wind_speed_unit: "mph",
            forecast_days: "10",
            daily:
              "temperature_2m_max,temperature_2m_min,relative_humidity_2m_max,precipitation_sum,precipitation_probability_max,windspeed_10m_max,winddirection_10m_dominant,weathercode,sunrise,sunset",
            hourly: "temperature_2m,relative_humidity_2m,dew_point_2m,cloud_cover,precipitation_probability,wind_speed_10m,weathercode",
            current: "temperature_2m,relative_humidity_2m,wind_speed_10m",
          });

          const wxRes = await fetch(`https://api.open-meteo.com/v1/forecast?${params.toString()}`);
          if (!wxRes.ok) throw new Error(`Weather fetch failed (${wxRes.status}).`);
          return await wxRes.json();
        }

        async function reverseGeocodeCurrentLocation({ lat, lon }) {
          const params = new URLSearchParams({
            latitude: String(lat),
            longitude: String(lon),
            localityLanguage: "en",
          });

          try {
            const res = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?${params.toString()}`);
            if (!res.ok) throw new Error("Reverse geocode failed.");
            const json = await res.json();
            const city = json.city || json.locality || json.principalSubdivision || json.countryName || "Current Location";
            const state = json.principalSubdivision || "";
            return { city, state };
          } catch (e) {
            console.warn("Reverse geocode failed", e);
            return { city: "Current Location", state: "" };
          }
        }

        async function fetchAllForLocation(loc) {
          if (!loc) {
            setLoading(false);
            return;
          }
          setLoading(true);
          try {
            let lat, lon, city, state, zipForPlace;

            if (loc.mode === "zip") {
              const z = loc.zip;
              const out = await lookupZipToCoords(z);
              lat = out.lat;
              lon = out.lon;
              city = out.city;
              state = out.state;
              zipForPlace = z;
            } else {
              lat = Number(loc.lat);
              lon = Number(loc.lon);
              city = loc.city ?? null;
              state = loc.state ?? null;
              zipForPlace = null;
              if (!Number.isFinite(lat) || !Number.isFinite(lon)) throw new Error("Search location had invalid coordinates.");
            }

            const label = loc.label ?? (loc.mode === "zip" ? zipLabels[loc.zip] ?? loc.zip : "Search");

            setPlace({
              zip: zipForPlace ?? "",
              city: city ?? "—",
              state: state ?? "",
              lat,
              lon,
              label,
              mode: loc.mode,
            });

            const wx = await fetchOpenMeteo({ lat, lon });

            setError("");
            setData(wx);
            setLastUpdated(new Date());

            const tz = wx?.timezone ?? "auto";
            const offset = Number(wx?.utc_offset_seconds ?? 0);
            const safeOffset = Number.isFinite(offset) ? offset : 0;
            setTzName(tz);
            setUtcOffsetSeconds(safeOffset);

            const firstDay = wx?.daily?.time?.[0] ?? null;
            setSelectedDate(firstDay);

            const sunrise0 = wx?.daily?.sunrise?.[0] ?? null;
            const sunset0 = wx?.daily?.sunset?.[0] ?? null;
            setBgMode(
              computeBgMode({
                nowUtcMillis: Date.now(),
                sunriseLocalIso: sunrise0,
                sunsetLocalIso: sunset0,
                utcOffsetSeconds: safeOffset,
              })
            );

            try {
              setMoon(moonInfoAtUtc(new Date()));
            } catch {
              setMoon(null);
            }

            try {
              if (firstDay) {
                setPlanets10pm(
                  computeVisiblePlanetsAt10pmLocal({
                    lat,
                    lon,
                    utcOffsetSeconds: safeOffset,
                    dateISO: firstDay,
                    tzName: tz,
                  })
                );
              } else {
                setPlanets10pm(null);
              }
            } catch (e) {
              console.warn("Planets calc failed", e);
              setPlanets10pm({
                localLabel: firstDay ? `${formatDateLabel(firstDay)}` : "",
                visible: [],
                error: "Planets calculation failed.",
              });
            }

            try {
              if (firstDay) {
                setMoonRiseSet(
                  computeMoonRiseSetForDate({
                    lat,
                    lon,
                    utcOffsetSeconds: safeOffset,
                    dateISO: firstDay,
                    tzName: tz,
                  }) ?? { rise: "—", set: "—" }
                );
              } else {
                setMoonRiseSet({ rise: "—", set: "—" });
              }
            } catch {
              setMoonRiseSet({ rise: "—", set: "—" });
            }
          } catch (e) {
            console.error(e);
            setError(e?.message ?? "Something went wrong.");
          } finally {
            setLoading(false);
          }
        }

        function fallbackToSavedLocation() {
          const defaultFavorite = defaultZip ? favorites.find((f) => f.mode === "zip" && f.zip === defaultZip) : null;
          const firstFavorite = favorites.find((f) => f?.mode === "zip" || f?.mode === "geo") ?? null;
          const fav = defaultFavorite ?? firstFavorite;

          if (!fav) {
            setActiveLocation(null);
            setZip(null);
            setLoading(false);
            return;
          }

          if (fav.mode === "zip") {
            setZip(fav.zip);
            setActiveLocation({
              mode: "zip",
              zip: fav.zip,
              label: fav.label || fav.zip,
              lat: null,
              lon: null,
              city: null,
              state: null,
            });
            return;
          }

          setZip(null);
          setActiveLocation({
            mode: "geo",
            zip: "",
            label: fav.label || favoriteDisplayLabel(fav),
            lat: fav.lat,
            lon: fav.lon,
            city: fav.city || null,
            state: fav.state || null,
          });
        }

        function useBrowserLocation({ persist = true, fallback = false } = {}) {
          if (!navigator.geolocation) {
            setLocationStatus("Location is not available in this browser.");
            if (fallback) fallbackToSavedLocation();
            return;
          }

          setRequestingLocation(true);
          setLocationStatus("Finding your location...");

          navigator.geolocation.getCurrentPosition(
            async (position) => {
              const lat = position.coords.latitude;
              const lon = position.coords.longitude;
              const locationName = await reverseGeocodeCurrentLocation({ lat, lon });
              const cityLabel = locationName.city || "Current Location";
              const nextLocation = {
                mode: "geo",
                source: "current",
                zip: "",
                label: cityLabel,
                lat,
                lon,
                city: cityLabel,
                state: locationName.state || "",
              };

              if (persist) {
                localStorage.setItem(USE_CURRENT_LOCATION_KEY, "true");
                setUseCurrentLocationDefault(true);
              }

              setZip(null);
              setActiveLocation(nextLocation);
              setLocationStatus("Using current location.");
              setRequestingLocation(false);
            },
            (error) => {
              console.warn("Location permission denied or unavailable:", error);
              if (persist) {
                localStorage.removeItem(USE_CURRENT_LOCATION_KEY);
                setUseCurrentLocationDefault(false);
              }
              setLocationStatus("Current location is unavailable.");
              setRequestingLocation(false);
              if (fallback) fallbackToSavedLocation();
              else setLoading(false);
            },
            {
              enableHighAccuracy: false,
              timeout: 8000,
              maximumAge: 10 * 60 * 1000,
            }
          );
        }

        // ---------- Search (Open-Meteo Geocoding) ----------
        async function runSearch(query) {
          const q = String(query ?? "").trim();
          if (!q) {
            setSearchResults([]);
            setSearchLoading(false);
            return;
          }

          // Always allow a "Use ZIP" action if 5 digits
          const zipCandidate = isLikelyZip(q) ? [{ _type: "zip", zip: q }] : [];

          // For pure zip, we can skip geocoding call (fast + reliable via Zippopotam)
          if (isLikelyZip(q)) {
            setSearchResults(zipCandidate);
            setSearchLoading(false);
            return;
          }

          try {
            setSearchLoading(true);
            const params = new URLSearchParams({
              name: q,
              count: "8",
              language: "en",
              format: "json",
            });
            const res = await fetch(`${GEO_API}?${params.toString()}`);
            if (!res.ok) throw new Error(`Geocoding failed (${res.status}).`);
            const json = await res.json();
            const results = (json?.results ?? []).map((r) => ({
              _type: "geo",
              id: r.id,
              name: r.name,
              admin1: r.admin1,
              country_code: r.country_code,
              latitude: r.latitude,
              longitude: r.longitude,
            }));

            setSearchResults([...zipCandidate, ...results]);
          } catch (e) {
            console.warn("Search error:", e);
            setSearchResults(zipCandidate);
          } finally {
            setSearchLoading(false);
          }
        }

        async function applySearchPick(pick) {
          if (!pick) return;

          if (pick._type === "zip") {
            const z = String(pick.zip ?? "").trim();
            if (!isLikelyZip(z)) return;

            // Set favorites dropdown + active location to that zip
            setZip(z);
            setActiveLocation({
              mode: "zip",
              zip: z,
              label: zipLabels[z] ?? z,
              lat: null,
              lon: null,
              city: null,
              state: null,
            });
            setSearchOpen(false);
            return;
          }

          if (pick._type === "geo") {
            const label = nicePlaceLabel(pick);
            setActiveLocation({
              mode: "geo",
              zip: "",
              label,
              lat: Number(pick.latitude),
              lon: Number(pick.longitude),
              city: pick.name ?? null,
              state: pick.admin1 ?? null,
            });
            setSearchText(label);
            setSearchOpen(false);
            return;
          }
        }

        // Debounced search
        useEffect(() => {
          if (!searchOpen) return;

          const q = String(searchText ?? "");
          if (searchDebounceRef.current) clearTimeout(searchDebounceRef.current);

          setSearchLoading(true);
          searchDebounceRef.current = setTimeout(() => runSearch(q), 350);

          return () => {
            if (searchDebounceRef.current) clearTimeout(searchDebounceRef.current);
          };
        }, [searchText, searchOpen]);

        // Close search on outside click (use click; avoid eating dropdown selection)
        useEffect(() => {

            if (!searchBoxRef.current) return;

          }
          document.addEventListener("click", onDocClick);

        useEffect(() => {

        // Startup selection: current location default, then saved favorite, then empty/search state.
        useEffect(() => {

        }, [favoritesLoaded, useCurrentLocationDefault, activeLocation]);

        // When favorites dropdown (or zip state) changes: update active location only if currently in ZIP mode
        useEffect(() => {
